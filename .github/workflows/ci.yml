name: CI

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:

  determine-changes:
    name: Determine changed files
    runs-on: ubuntu-latest
    outputs:
      github_actions: ${{ steps.changed-files.outputs.github_actions_any_changed }}
      github_actions_ci: ${{ steps.changed-files.outputs.github_actions_ci_any_changed }}
      renovate_config: ${{ steps.changed-files.outputs.renovate_config_any_changed }}
      md: ${{ steps.changed-files.outputs.md_any_changed }}
      json5: ${{ steps.changed-files.outputs.json5_any_changed }}
      json5_files: ${{ steps.changed-files.outputs.json5_all_changed_files }}
      toml: ${{ steps.changed-files.outputs.toml_any_changed }}
      yaml: ${{ steps.changed-files.outputs.yaml_any_changed }}
      rust: ${{ steps.changed-files.outputs.rust_any_changed }}

    steps:
      - name: Checkout the main repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Determine changed files
        id: changed-files
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        with:
          files_yaml: |
            github_actions:
              - .github/workflows/**
            github_actions_ci:
              - .github/workflows/ci.yml
            renovate_config:
              - .github/renovate.json5
            md:
              - '**/*.md'
              - .markdownlint-cli2.yaml
            json5:
              - '**/*.json5'
            toml:
              - '**/*.toml'
              - .taplo.toml
            yaml:
              - '**/*.yml'
              - '**/*.yaml'
              - .yamllint.yaml
            rust:
              - 'rust-toolchain.toml'
              - '**/*.rs'
              - '**/Cargo.toml'
              - 'Cargo.lock'
              - '.rustfmt.toml'

  lint-gh-actions:
    name: Lint GitHub Actions
    needs: determine-changes
    if: ${{ needs.determine-changes.outputs.github_actions == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      security-events: write

    steps:
      - name: Checkout the main repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run actionlint
        if: github.event_name != 'pull_request'
        run: |
          go install github.com/rhysd/actionlint/cmd/actionlint@914e7df21a07ef503a81201c76d2b11c789d3fca # v1.7.12
          "$(go env GOPATH)/bin/actionlint" -color

      - name: Run actionlint (reviewdog)
        if: github.event_name == 'pull_request'
        uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1.72.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          fail_level: error

      - name: List workflows for zizmor
        id: list-workflows
        run: |
          {
            echo "inputs<<EOF"
            find .github/workflows -maxdepth 1 -type f \( -name '*.yml' -o -name '*.yaml' \) \
              ! -name 'release.yml'
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@b1d7e1fb5de872772f31590499237e7cce841e8e # v0.5.3
        with:
          version: 'v1.24.1'
          inputs: ${{ steps.list-workflows.outputs.inputs }}
          # advanced-security: false  # must be false for private repo

  validate-renovate-config:
    name: Validate Renovate config
    needs: determine-changes
    if: >-
      ${{ needs.determine-changes.outputs.renovate_config == 'true' ||
      needs.determine-changes.outputs.github_actions_ci == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout the main repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Validate Renovate config
        run: |
          npx --yes --package renovate@43.139.1 \
            renovate-config-validator .github/renovate.json5

  lint-markdown:
    name: Lint Markdown
    needs: determine-changes
    if: >-
      ${{ needs.determine-changes.outputs.md == 'true' ||
      needs.determine-changes.outputs.github_actions_ci == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout the main repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Lint Markdown
        if: github.event_name != 'pull_request'
        run: npx --yes markdownlint-cli2@0.22.1 .

      - name: Set up reviewdog
        if: github.event_name == 'pull_request'
        uses: reviewdog/action-setup@d8a7baabd7f3e8544ee4dbde3ee41d0011c3a93f # v1.5.0
        with:
          reviewdog_version: 'v0.21.0'

      - name: Lint Markdown (reviewdog)
        if: github.event_name == 'pull_request'
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          markdownlint_rc=0
          npx --yes markdownlint-cli2@0.22.1 . > /tmp/markdownlint-report.txt 2>&1 || markdownlint_rc=$?
          reviewdog_rc=0
          reviewdog < /tmp/markdownlint-report.txt \
              -efm="%f:%l:%c %m" \
              -efm="%f:%l %m" \
              -name=markdownlint \
              -reporter=github-pr-review \
              -fail-level=error || reviewdog_rc=$?
          if [ $markdownlint_rc -ne 0 ] && ! grep -Eq '^[^:]+:[0-9]+(:[0-9]+)? ' /tmp/markdownlint-report.txt; then
            echo "::error title=markdownlint::markdownlint failed before producing parseable diagnostics"
            exit $markdownlint_rc
          fi
          exit $reviewdog_rc

  lint-json5:
    name: Lint JSON5
    needs: determine-changes
    if: >-
      ${{ needs.determine-changes.outputs.json5 == 'true' ||
      needs.determine-changes.outputs.github_actions_ci == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout the main repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Check JSON5 syntax
        env:
          CHANGED_JSON5_FILES: ${{ needs.determine-changes.outputs.json5_files }}
        run: |
          readarray -t json5_files < <(
            printf '%s\n' "${CHANGED_JSON5_FILES}" | tr ' ' '\n' | sed '/^$/d'
          )
          if [ ${#json5_files[@]} -eq 0 ]; then
            readarray -d '' -t json5_files < <(
              find . -type f -name '*.json5' -not -path './.git/*' -print0
            )
          fi
          if [ ${#json5_files[@]} -eq 0 ]; then
            echo 'No JSON5 files found.'
            exit 0
          fi
          npx --yes json5@2.2.3 "${json5_files[@]}" >/dev/null

  lint-toml:
    name: Lint TOML
    needs: determine-changes
    if: >-
      ${{ needs.determine-changes.outputs.toml == 'true' ||
      needs.determine-changes.outputs.github_actions_ci == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout the main repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Taplo
        env:
          TAPLO_VERSION: '0.10.0'
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -fsSL "https://github.com/tamasfe/taplo/releases/download/${TAPLO_VERSION}/taplo-linux-x86_64.gz" \
            | gzip -d > "$HOME/.local/bin/taplo"
          chmod +x "$HOME/.local/bin/taplo"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Check TOML format
        run: taplo fmt --check

      - name: Lint TOML
        run: taplo lint

  lint-yaml:
    name: Lint YAML
    needs: determine-changes
    if: >-
      ${{ needs.determine-changes.outputs.yaml == 'true' ||
      needs.determine-changes.outputs.github_actions_ci == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout the main repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install uv
        if: github.event_name != 'pull_request'
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: '0.11.7'

      - name: Lint YAML
        if: github.event_name != 'pull_request'
        run: uvx --from "yamllint==1.38.0" yamllint .

      - name: Lint YAML (reviewdog)
        if: github.event_name == 'pull_request'
        uses: reviewdog/action-yamllint@f01d8a48fd8d89f89895499fca2cff09f9e9e8c0 # v1.21.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          fail_level: error
          yamllint_flags: .

  check-prek:
    name: Check prek
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the main repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Check prek
        uses: j178/prek-action@cbc2f23eb5539cf20d82d1aabd0d0ecbcc56f4e3 # v2.0.2
        with:
          prek-version: 'v0.3.10'
          extra-args: '--all-files --skip no-commit-to-branch'

  build-rust:
    name: Check Rust build
    needs: determine-changes
    if: >-
      ${{ needs.determine-changes.outputs.rust == 'true' ||
      needs.determine-changes.outputs.github_actions_ci == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the main repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@2b1f5e9b395427c92ee4e3331786ca3c37afe2d7 # v1.16.0

      - name: Run cargo check
        run: cargo check --all-targets --all-features

  lint-rust:
    name: Lint Rust
    needs: determine-changes
    if: >-
      ${{ needs.determine-changes.outputs.rust == 'true' ||
      needs.determine-changes.outputs.github_actions_ci == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout the main repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@2b1f5e9b395427c92ee4e3331786ca3c37afe2d7 # v1.16.0

      - name: Run Rustfmt check
        if: github.event_name != 'pull_request'
        run: cargo fmt --all -- --check

      - name: Run Rustfmt
        if: github.event_name == 'pull_request'
        run: cargo fmt --all

      - name: Suggest Rustfmt changes (reviewdog)
        if: github.event_name == 'pull_request'
        uses: reviewdog/action-suggester@aa38384ceb608d00f84b4690cacc83a5aba307ff # v1.24.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tool_name: rustfmt

      - name: Check Rustfmt diff
        if: github.event_name == 'pull_request'
        run: git diff --exit-code

      - name: Run Clippy
        if: github.event_name != 'pull_request'
        run: cargo clippy --all-targets --all-features

      - name: Set up reviewdog
        if: github.event_name == 'pull_request'
        uses: reviewdog/action-setup@d8a7baabd7f3e8544ee4dbde3ee41d0011c3a93f # v1.5.0
        with:
          reviewdog_version: 'v0.21.0'

      - name: Run Clippy (reviewdog)
        if: github.event_name == 'pull_request'
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          clippy_rc=0
          cargo clippy --all-targets --all-features --message-format=json > /tmp/clippy-report.json || clippy_rc=$?
          reviewdog_rc=0
          jq -c '
            select(.reason == "compiler-message") |
            .message as $m |
            select($m.level == "warning" or $m.level == "error") |
            ($m.spans // [])[] |
            select(.is_primary == true) |
            {
              source: {name: "clippy"},
              severity: (if $m.level == "error" then "ERROR" else "WARNING" end),
              message: ($m.message + (if $m.code and $m.code.code then " (" + $m.code.code + ")" else "" end)),
              location: {
                path: .file_name,
                range: {
                  start: {line: .line_start, column: .column_start},
                  end: {line: .line_end, column: .column_end}
                }
              }
            }
          ' /tmp/clippy-report.json > /tmp/clippy-rdjsonl.txt || true
          reviewdog < /tmp/clippy-rdjsonl.txt \
              -f=rdjsonl \
              -name=clippy \
              -reporter=github-pr-review \
              -fail-level=error \
              -tee || reviewdog_rc=$?
          if [ $clippy_rc -ne 0 ] && [ ! -s /tmp/clippy-rdjsonl.txt ]; then
            echo "::error title=clippy::clippy failed before producing diagnostics for reviewdog"
            exit $clippy_rc
          fi
          exit $reviewdog_rc

  test-rust:
    name: Test Rust
    needs: determine-changes
    if: >-
      ${{ needs.determine-changes.outputs.rust == 'true' ||
      needs.determine-changes.outputs.github_actions_ci == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the main repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@2b1f5e9b395427c92ee4e3331786ca3c37afe2d7 # v1.16.0

      - name: Run tests
        run: cargo test --all-features

  check-typos:
    name: Check typos
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout the main repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Check spelling
        if: github.event_name != 'pull_request'
        uses: crate-ci/typos@cf5f1c29a8ac336af8568821ec41919923b05a83 # v1.45.1
        with:
          files: |
            .
            .github/**

      - name: Check spelling (reviewdog)
        if: github.event_name == 'pull_request'
        uses: reviewdog/action-typos@d5eb1bbcd1b3bfde596f6eeb470322727862fe98 # v1.19.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          fail_level: error
          typos_flags: --hidden .

  lint-commit-messages:
    name: Lint commit messages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the main repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Commitizen
        uses: commitizen-tools/setup-cz@7247d00792cbaf3408d7f8d2c6a010ca3b40c10e # v0.9.0
        with:
          python-version: '3.x'
          version: '4.13.10'

      - name: Lint commit messages on push
        if: github.event_name == 'push'
        run: cz check --rev-range ${{ github.event.before }}..${{ github.sha }}

      - name: Lint commit messages on pull request
        if: github.event_name == 'pull_request'
        run: cz check --rev-range ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}
