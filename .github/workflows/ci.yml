name: CI

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.ref || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:

  determine-changes:
    name: Determine changed files
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      github_actions: ${{ steps.changed-files.outputs.github_actions_any_changed }}
      github_actions_ci: ${{ steps.changed-files.outputs.github_actions_ci_any_changed }}
      renovate_config: ${{ steps.changed-files.outputs.renovate_config_any_changed }}
      md: ${{ steps.changed-files.outputs.md_any_changed }}
      json5: ${{ steps.changed-files.outputs.json5_any_changed }}
      json5_files: ${{ steps.changed-files.outputs.json5_all_changed_files }}
      toml: ${{ steps.changed-files.outputs.toml_any_changed }}
      yaml: ${{ steps.changed-files.outputs.yaml_any_changed }}
      rust: ${{ steps.changed-files.outputs.rust_any_changed }}

    steps:
      - name: Checkout the main repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Determine changed files
        id: changed-files
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        with:
          safe_output: false
          separator: "\n"
          files_yaml: |
            github_actions:
              - .github/workflows/**
            github_actions_ci:
              - .github/workflows/ci.yml
            renovate_config:
              - .github/renovate.json5
            md:
              - '**/*.md'
              - .markdownlint-cli2.yaml
            json5:
              - '**/*.json5'
            toml:
              - '**/*.toml'
              - .tombi.toml
            yaml:
              - '**/*.yml'
              - '**/*.yaml'
              - .yamllint.yaml
            rust:
              - 'rust-toolchain.toml'
              - '**/*.rs'
              - '**/Cargo.toml'
              - 'Cargo.lock'
              - '.rustfmt.toml'

  lint-gh-actions:
    name: Lint GitHub Actions
    needs: determine-changes
    if: ${{ needs.determine-changes.outputs.github_actions == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
      security-events: write

    steps:
      - name: Checkout the main repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run actionlint
        if: github.event_name != 'pull_request'
        run: |
          go install github.com/rhysd/actionlint/cmd/actionlint@914e7df21a07ef503a81201c76d2b11c789d3fca # v1.7.12
          "$(go env GOPATH)/bin/actionlint" -color

      - name: Run actionlint (reviewdog)
        if: github.event_name == 'pull_request'
        uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1.72.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          fail_level: error

      - name: List workflows for zizmor
        id: list-workflows
        run: |
          {
            echo "inputs<<EOF"
            find .github/workflows -maxdepth 1 -type f \( -name '*.yml' -o -name '*.yaml' \) \
              ! -name 'release.yml'
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@6599ee8b7a49aef6a770f63d261d214911a7ce02 # v0.6.0
        with:
          version: 'v1.24.1'
          inputs: ${{ steps.list-workflows.outputs.inputs }}
          advanced-security: false
          annotations: true

      - name: Run zizmor (SARIF upload)
        if: >-
          ${{
            always() &&
            github.event.repository.private == false &&
            (github.event_name != 'pull_request' ||
            github.event.pull_request.head.repo.full_name == github.repository)
          }}
        uses: zizmorcore/zizmor-action@6599ee8b7a49aef6a770f63d261d214911a7ce02 # v0.6.0
        with:
          version: 'v1.24.1'
          inputs: ${{ steps.list-workflows.outputs.inputs }}
          advanced-security: true

  validate-renovate-config:
    name: Validate Renovate config
    needs: determine-changes
    if: >-
      ${{ needs.determine-changes.outputs.renovate_config == 'true' ||
      needs.determine-changes.outputs.github_actions_ci == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout the main repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24

      - name: Validate Renovate config
        run: |
          npx --yes --package renovate@43.257.2 \
            renovate-config-validator .github/renovate.json5

  lint-markdown:
    name: Lint Markdown
    needs: determine-changes
    if: >-
      ${{ needs.determine-changes.outputs.md == 'true' ||
      needs.determine-changes.outputs.github_actions_ci == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout the main repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Lint Markdown
        if: github.event_name != 'pull_request'
        run: npx --yes markdownlint-cli2@0.23.1 .

      - name: Set up reviewdog
        if: github.event_name == 'pull_request'
        uses: reviewdog/action-setup@d8a7baabd7f3e8544ee4dbde3ee41d0011c3a93f # v1.5.0
        with:
          reviewdog_version: 'v0.21.0'

      - name: Lint Markdown (reviewdog)
        if: github.event_name == 'pull_request'
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          markdownlint_rc=0
          npx --yes markdownlint-cli2@0.23.1 . > /tmp/markdownlint-report.txt 2>&1 || markdownlint_rc=$?
          reviewdog_rc=0
          reviewdog < /tmp/markdownlint-report.txt \
              -efm="%f:%l:%c %m" \
              -efm="%f:%l %m" \
              -name=markdownlint \
              -reporter=github-pr-review \
              -fail-level=error || reviewdog_rc=$?
          if [ $markdownlint_rc -ne 0 ] && ! grep -Eq '^[^:]+:[0-9]+(:[0-9]+)? ' /tmp/markdownlint-report.txt; then
            echo "::error title=markdownlint::markdownlint failed before producing parseable diagnostics"
            exit $markdownlint_rc
          fi
          exit $reviewdog_rc

  lint-json5:
    name: Lint JSON5
    needs: determine-changes
    if: >-
      ${{ needs.determine-changes.outputs.json5 == 'true' ||
      needs.determine-changes.outputs.github_actions_ci == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout the main repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Check JSON5 syntax
        env:
          CHANGED_JSON5_FILES: ${{ needs.determine-changes.outputs.json5_files }}
        run: |
          readarray -t json5_files < <(
            printf '%s\n' "${CHANGED_JSON5_FILES}" | sed '/^$/d'
          )
          if [ ${#json5_files[@]} -eq 0 ]; then
            readarray -d '' -t json5_files < <(
              find . -type f -name '*.json5' -not -path './.git/*' -print0
            )
          fi
          if [ ${#json5_files[@]} -eq 0 ]; then
            echo 'No JSON5 files found.'
            exit 0
          fi
          exit_code=0
          for json5_file in "${json5_files[@]}"; do
            npx --yes json5@2.2.3 --validate "$json5_file" || exit_code=1
          done
          exit $exit_code

  lint-toml:
    name: Lint TOML
    needs: determine-changes
    if: >-
      ${{ needs.determine-changes.outputs.toml == 'true' ||
      needs.determine-changes.outputs.github_actions_ci == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout the main repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Tombi
        uses: tombi-toml/setup-tombi@f2ae7247d62521245eb2793d653b9df472b9e090 # v1.2.4
        with:
          version: '1.2.4'

      - name: Lint TOML
        if: github.event_name != 'pull_request'
        run: tombi lint

      - name: Set up reviewdog
        if: github.event_name == 'pull_request'
        uses: reviewdog/action-setup@d8a7baabd7f3e8544ee4dbde3ee41d0011c3a93f # v1.5.0
        with:
          reviewdog_version: 'v0.21.0'

      - name: Lint TOML (reviewdog)
        if: github.event_name == 'pull_request'
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NO_COLOR: '1'
        run: |
          lint_rc=0
          tombi lint --quiet > /tmp/tombi-lint-report.txt 2>&1 || lint_rc=$?
          gawk '
            match($0, /^[[:space:]]*(Warning|Error):[[:space:]]*(.*)$/, m) {
              severity = m[1]; message = m[2]; next
            }
            match($0, /^[[:space:]]*at[[:space:]]+(.*):([0-9]+):([0-9]+)/, m) {
              printf "%s:%s:%s: %s: %s\n", m[1], m[2], m[3], substr(severity, 1, 1), message
            }
          ' /tmp/tombi-lint-report.txt > /tmp/tombi-lint-report.efm.txt
          reviewdog_rc=0
          reviewdog < /tmp/tombi-lint-report.efm.txt \
              -efm="%f:%l:%c: %t: %m" \
              -name=tombi-lint \
              -reporter=github-pr-review \
              -fail-level=error || reviewdog_rc=$?
          if [ $lint_rc -ne 0 ] && [ ! -s /tmp/tombi-lint-report.efm.txt ]; then
            echo "::error title=tombi::tombi lint failed before producing parseable diagnostics"
            cat /tmp/tombi-lint-report.txt
            exit $lint_rc
          fi
          exit $reviewdog_rc

      - name: Format TOML
        run: tombi format

      - name: Suggest TOML format changes (reviewdog)
        if: github.event_name == 'pull_request'
        uses: reviewdog/action-suggester@2558ba17e65a9039e73764a73009fc05fef28a46 # v1.24.3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tool_name: tombi-format
          cleanup: 'false'

      - name: Check TOML format
        run: git diff --exit-code

  lint-yaml:
    name: Lint YAML
    needs: determine-changes
    if: >-
      ${{ needs.determine-changes.outputs.yaml == 'true' ||
      needs.determine-changes.outputs.github_actions_ci == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout the main repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        if: github.event_name != 'pull_request'
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: '0.11.30'

      - name: Lint YAML
        if: github.event_name != 'pull_request'
        run: uvx --from "yamllint==1.38.0" yamllint .

      - name: Lint YAML (reviewdog)
        if: github.event_name == 'pull_request'
        uses: reviewdog/action-yamllint@e02a49fdf53f51ddd8dfa89b09aa975043aeba38 # v1.23.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          fail_level: error
          yamllint_flags: .

  check-prek:
    name: Check prek
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout the main repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Check prek
        uses: j178/prek-action@5337cb91e0fa35a7ff31b9ca345126d8bbbcdf16 # v2.0.6
        with:
          prek-version: 'v0.4.10'
          extra-args: '--all-files --skip no-commit-to-branch'

  build-rust:
    name: Check Rust build
    needs: determine-changes
    if: >-
      ${{ needs.determine-changes.outputs.rust == 'true' ||
      needs.determine-changes.outputs.github_actions_ci == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout the main repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0

      - name: Run cargo check
        run: cargo check --all-targets --all-features

  lint-rust:
    name: Lint Rust
    needs: determine-changes
    if: >-
      ${{ needs.determine-changes.outputs.rust == 'true' ||
      needs.determine-changes.outputs.github_actions_ci == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout the main repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0

      - name: Run Rustfmt check
        if: github.event_name != 'pull_request'
        run: cargo fmt --all -- --check

      - name: Run Rustfmt
        if: github.event_name == 'pull_request'
        run: cargo fmt --all

      - name: Suggest Rustfmt changes (reviewdog)
        if: github.event_name == 'pull_request'
        uses: reviewdog/action-suggester@2558ba17e65a9039e73764a73009fc05fef28a46 # v1.24.3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tool_name: rustfmt
          cleanup: 'false'

      - name: Check Rustfmt diff
        if: github.event_name == 'pull_request'
        run: git diff --exit-code

      - name: Run Clippy
        if: github.event_name != 'pull_request'
        run: cargo clippy --all-targets --all-features

      - name: Set up reviewdog
        if: github.event_name == 'pull_request'
        uses: reviewdog/action-setup@d8a7baabd7f3e8544ee4dbde3ee41d0011c3a93f # v1.5.0
        with:
          reviewdog_version: 'v0.21.0'

      - name: Run Clippy (reviewdog)
        if: github.event_name == 'pull_request'
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          clippy_rc=0
          cargo clippy --all-targets --all-features --message-format=json > /tmp/clippy-report.json || clippy_rc=$?
          reviewdog_rc=0
          jq -c '
            select(.reason == "compiler-message") |
            .message as $m |
            select($m.level == "warning" or $m.level == "error") |
            ($m.spans // [])[] |
            select(.is_primary == true) |
            {
              source: {name: "clippy"},
              severity: (if $m.level == "error" then "ERROR" else "WARNING" end),
              message: ($m.message + (if $m.code and $m.code.code then " (" + $m.code.code + ")" else "" end)),
              location: {
                path: .file_name,
                range: {
                  start: {line: .line_start, column: .column_start},
                  end: {line: .line_end, column: .column_end}
                }
              }
            }
          ' /tmp/clippy-report.json > /tmp/clippy-rdjsonl.txt || true
          reviewdog < /tmp/clippy-rdjsonl.txt \
              -f=rdjsonl \
              -name=clippy \
              -reporter=github-pr-review \
              -fail-level=error \
              -tee || reviewdog_rc=$?
          if [ $clippy_rc -ne 0 ] && [ ! -s /tmp/clippy-rdjsonl.txt ]; then
            echo "::error title=clippy::clippy failed before producing diagnostics for reviewdog"
            exit $clippy_rc
          fi
          exit $reviewdog_rc

  test-rust:
    name: Test Rust
    needs: determine-changes
    if: >-
      ${{ needs.determine-changes.outputs.rust == 'true' ||
      needs.determine-changes.outputs.github_actions_ci == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout the main repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0

      - name: Run tests
        run: cargo test --all-features

  check-typos:
    name: Check typos
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout the main repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Check spelling
        if: github.event_name != 'pull_request'
        uses: crate-ci/typos@bee27e3a4fd1ea2111cf90ab89cd076c870fce14 # v1.48.0

      - name: Check spelling (reviewdog)
        if: github.event_name == 'pull_request'
        uses: reviewdog/action-typos@d5eb1bbcd1b3bfde596f6eeb470322727862fe98 # v1.19.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          fail_level: error
          typos_flags: .

  lint-commit-messages:
    name: Lint commit messages
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout the main repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Commitizen
        uses: commitizen-tools/setup-cz@96c75e6ae9632047f2c9b4025b9dd1624b40de8f # v0.9.1
        with:
          python-version: '3.x'
          version: '4.16.5'

      - name: Lint commit messages on push
        if: github.event_name == 'push'
        env:
          BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          if ! git cat-file -e "${BEFORE_SHA}^{commit}" 2>/dev/null; then
            echo "::notice title=cz check::Base commit unavailable (new branch or force push); skipping lint."
            exit 0
          fi
          cz check --rev-range "${BEFORE_SHA}..${HEAD_SHA}"

      - name: Lint commit messages on pull request
        if: github.event_name == 'pull_request'
        run: cz check --rev-range ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}
